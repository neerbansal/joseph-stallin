<!DOCTYPE html>
<html lang="en>
<head>
    <meta charset=" UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invincible OS - Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>


    <div id="boot-screen">
        <canvas id="matrix-canvas"></canvas>
        <div class="boot-content">
            <h1 class="boot-title">INVINCIBLE OS</h1>
            <p class="boot-sub">tap anywhere to enter — no password needed</p>
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop" class="hidden">

        <div class="workspace">
            <div class="apps-zone" id="appsZone"></div>
        </div>

        <!-- Draggable brand widget -->
        <div id="widget-layer"></div>

        <!-- App windows -->
        <div id="window-layer"></div>

        <!-- Taskbar -->
        <div class="taskbar">
            <div class="everything-btn" id="everythingBtn">
                <span class="icon-emoji">🌐</span>
            </div>
            <div class="tools-dock" id="toolsDock">
                <div class="dock-icon" id="themeToggle">
                    <span class="icon-emoji">🌙</span>
                </div>
            </div>
        </div>

        </div>

        <script src="script.js"></script>
        </body>
        <html>
