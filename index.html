<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invincible OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="boot-screen">
    <div class="boot-content">
      <h1 class="boot-title">INVINCIBLE OS</h1>
      <p class="boot-sub">tap anywhere to enter — no password needed</p>
    </div>
  </div>

  <div id="desktop" class="hidden">

    <div class="workspace">
      <div class="apps-zone" id="appsZone"></div>
      <div class="widgets-zone" id="widgetsZone">
        <div class="glass-widget">
          <h4 class="widget-title">SYSTEM</h4>
          <div id="system-clock">00:00</div>
        </div>
      </div>
    </div>

    <!-- draggable brand widget, lives in its own layer so it sits under app windows -->
    <div id="widget-layer"></div>

    <div id="window-layer"></div>

    <div class="taskbar">
      <div class="everything-btn" id="everythingBtn">
        <img src="assets/icons/everything.png" class="icon-img" alt="apps" onerror="this.outerHTML='<span class=icon-emoji>🌐</span>'">
      </div>
      <div class="tools-dock" id="toolsDock">
        <div class="dock-icon" id="themeToggle">
          <span class="icon-emoji">🌙</span>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
